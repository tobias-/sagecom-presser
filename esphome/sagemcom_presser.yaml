substitutions:
  name: sagemcom-presser
  friendly_name: Sagemcom Presser
  # On AI Thinker ESP32-CAM, GPIO14 is typically free if SD-card is not used.
  solenoid_gate_pin: GPIO14

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.6.0
  on_boot:
    # Force solenoid OFF as early as possible at boot.
    priority: 800
    then:
      - output.turn_off: solenoid_gate

esp32:
  board: esp32dev
  framework:
    type: esp-idf

psram:

logger:

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret fallback_ap_password

captive_portal:

web_server:
  port: 80

# ---------- Solenoid Control ----------
# Wiring summary:
# - +12V -> Solenoid+
# - Solenoid- -> MOSFET drain
# - MOSFET source -> GND
# - ESP32 GPIO -> 100-220 ohm -> MOSFET gate
# - 100k gate pulldown gate->GND
# - Flyback diode across solenoid:
#   cathode to +12V, anode to drain/Solenoid-
#
# Confirmed solenoid rating:
# - 12V, 650mA (~7.8W)

output:
  - platform: gpio
    id: solenoid_gate
    pin:
      number: ${solenoid_gate_pin}
      mode: OUTPUT
    inverted: false

switch:
  - platform: template
    id: solenoid_armed
    name: "${friendly_name} Solenoid Armed"
    icon: mdi:shield-lock-outline
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

number:
  - platform: template
    id: solenoid_pulse_ms
    name: "${friendly_name} Solenoid Pulse (ms)"
    icon: mdi:timer-outline
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 120
    min_value: 40
    max_value: 500
    step: 5
    mode: box
  - platform: template
    id: solenoid_cooldown_ms
    name: "${friendly_name} Solenoid Cooldown (ms)"
    icon: mdi:timer-sand
    entity_category: config
    optimistic: true
    restore_value: true
    initial_value: 2000
    min_value: 300
    max_value: 10000
    step: 100
    mode: box

globals:
  - id: solenoid_last_fire_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

script:
  - id: solenoid_press
    mode: restart
    then:
      - if:
          condition:
            and:
              - switch.is_on: solenoid_armed
              - lambda: |-
                  const uint32_t now = millis();
                  const uint32_t cooldown = (uint32_t) id(solenoid_cooldown_ms).state;
                  return (now - id(solenoid_last_fire_ms)) >= cooldown;
          then:
            - lambda: |-
                id(solenoid_last_fire_ms) = millis();
            - output.turn_on: solenoid_gate
            - delay: !lambda "return (uint32_t) id(solenoid_pulse_ms).state;"
            - output.turn_off: solenoid_gate
          else:
            - logger.log:
                level: WARN
                format: "Solenoid pulse blocked (disarmed or cooldown active)."

button:
  - platform: template
    id: press_meter_button
    name: "${friendly_name} Press Meter Button"
    icon: mdi:gesture-tap-button
    on_press:
      - script.execute: solenoid_press

binary_sensor:
  - platform: template
    name: "${friendly_name} Solenoid Ready"
    icon: mdi:check-circle-outline
    lambda: |-
      const uint32_t now = millis();
      const uint32_t cooldown = (uint32_t) id(solenoid_cooldown_ms).state;
      const bool cooled_down = (now - id(solenoid_last_fire_ms)) >= cooldown;
      return id(solenoid_armed).state && cooled_down;
    update_interval: 250ms

sensor:
  - platform: template
    name: "${friendly_name} Solenoid Cooldown Remaining (ms)"
    icon: mdi:timer-sand-complete
    accuracy_decimals: 0
    update_interval: 250ms
    lambda: |-
      const uint32_t now = millis();
      const uint32_t cooldown = (uint32_t) id(solenoid_cooldown_ms).state;
      const uint32_t elapsed = now - id(solenoid_last_fire_ms);
      if (elapsed >= cooldown) return 0;
      return (float) (cooldown - elapsed);

# ---------- ESP32-CAM (AI Thinker pin map) ----------
esp32_camera:
  name: "${friendly_name} Camera"
  external_clock:
    pin: GPIO0
    frequency: 20MHz
  i2c_pins:
    sda: GPIO26
    scl: GPIO27
  data_pins: [GPIO5, GPIO18, GPIO19, GPIO21, GPIO36, GPIO39, GPIO34, GPIO35]
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: 640x480
  jpeg_quality: 12
  max_framerate: 10 fps
  vertical_flip: false
  horizontal_mirror: false

esp32_camera_web_server:
  - port: 8080
    mode: stream
